clickable_minimum_required: 8.4.0
builder: custom

skip_review: false


build:
- gcc $ROOT/utils/mkdir.c -o $ROOT/utils/mkdir
- gcc $ROOT/utils/firstinstall.c -o $ROOT/utils/firstinstall
- rm -rf ${ROOT}/squashfs-root/
- echo '-----Compile debs and patches'
- ${ROOT}/compiledeps.sh


- mkdir -p ${BUILD_DIR}/bin
- mkdir -p $INSTALL_DIR/bin
- echo '-----decompress-----'
- echo $INSTALL_DIR/bin
- cd $INSTALL_DIR/bin
- unsquashfs -d $INSTALL_DIR/bin -percentage $ROOT/prospect-mail/dist/prospect-mail_2.0.0_arm64.snap 
- cp $ROOT/*.sh $INSTALL_DIR/bin
- mkdir -p $INSTALL_DIR/lib/aarch64-linux-gnu 
- cp /usr/lib/aarch64-linux-gnu/libfuse.so.2.9.9 $INSTALL_DIR/lib/aarch64-linux-gnu/
- cp /usr/lib/aarch64-linux-gnu/libfuse.so.2 $INSTALL_DIR/lib/aarch64-linux-gnu/
- cp /usr/lib/aarch64-linux-gnu/libfuse.so.2 $INSTALL_DIR/lib/aarch64-linux-gnu/libfuse.so
- cp /usr/bin/notify-send $INSTALL_DIR/bin
- cp /usr/bin/ls $INSTALL_DIR/bin
- cp /usr/bin/grep $INSTALL_DIR/bin
- cp /usr/bin/awk $INSTALL_DIR/bin
- cp /usr/bin/pkill $INSTALL_DIR/bin
- cp /usr/bin/pgrep $INSTALL_DIR/bin
- cp /usr/bin/nohup $INSTALL_DIR/bin
- cp /usr/bin/rm $INSTALL_DIR/bin
- cp /usr/bin/ps $INSTALL_DIR/bin
- cp /usr/bin/ping $INSTALL_DIR/bin

install_root_data:
- manifest.json
- qml
- prospectmail.apparmor
- prospectmail.desktop
- assets
- utils
- push-apparmor.json
- push.json
- pushexec
dependencies_host: ["libnotify-bin","notify-osd","xdotool","psmisc","g++","jq","libgtk2.0-dev","libgtk-3-dev","libmaliit-glib-dev","build-essential","meson","libtool","m4","automake","squashfs-tools","qemu-user-static" , "tree" , "patchelf", "git", "jq", "curl", "build-essential", "python3", "python3-pip", "libudev-dev", "dpkg", "moreutils","libssl-dev", "libsqlite3-dev", "libcrypto++-dev", "libsqlcipher-dev", "npm", "git-lfs", "execstack", "imagemagick", "librsvg2-bin", "debhelper-compat", "xauth", "xvfb",'squashfs-tools']

dependencies_target: [ "iputils-ping","notify-osd","libnotify-bin","psmisc","xdotool","qemu-user-static","g++", "fuse", "zlib1g","libfuse2","squashfs-tools","libgtk2.0-dev","libgtk-3-dev","libmaliit-glib-dev"]
