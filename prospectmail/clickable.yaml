clickable_minimum_required: 8.4.0
builder: custom

skip_review: true
kill: 
  killprospect.sh
build:

- rm -rf ${ROOT}/squashfs-root/
- echo '-----Compile maliit patches'
- ${ROOT}/maliit.sh
- echo 'Going to download ProspectMail...'
- ${ROOT}/get.sh            
- echo '------install dir-------'

- mkdir -p ${BUILD_DIR}/bin
- mkdir -p $INSTALL_DIR/bin
- echo '-----decompress-----'
- echo $INSTALL_DIR/bin
- cd $INSTALL_DIR/bin
- unsquashfs -d $INSTALL_DIR/bin -percentage $ROOT/prospect-mail.snap 
- cp $ROOT/*.sh $INSTALL_DIR/bin
- mkdir -p $INSTALL_DIR/lib/aarch64-linux-gnu 
#- cd $ROOT && cd utils/zlib && ./configure && make && cp -r *  $INSTALL_DIR/lib/aarch64-linux-gnu/
- cp /usr/lib/aarch64-linux-gnu/libfuse.so.2.9.9 $INSTALL_DIR/lib/aarch64-linux-gnu/
- cp /usr/lib/aarch64-linux-gnu/libfuse.so.2 $INSTALL_DIR/lib/aarch64-linux-gnu/
- cp /usr/lib/aarch64-linux-gnu/libfuse.so.2 $INSTALL_DIR/lib/aarch64-linux-gnu/libfuse.so
install_root_data:
- manifest.json
- launcher_prospect.sh
- prospectmail.apparmor
- prospectmail.desktop
- assets
dependencies_host: ["g++","jq","libgtk2.0-dev","libgtk-3-dev","libmaliit-glib-dev","build-essential","meson","libtool","m4","automake","squashfs-tools","qemu-user-static" , "tree" , "patchelf", "git", "jq", "curl", "build-essential", "python3", "python3-pip", "libudev-dev", "dpkg", "moreutils","libssl-dev", "libsqlite3-dev", "libcrypto++-dev", "libsqlcipher-dev", "npm", "git-lfs", "execstack", "imagemagick", "librsvg2-bin", "debhelper-compat", "xauth", "xvfb",'squashfs-tools']

dependencies_target: ["qemu-user-static","g++", "fuse", "zlib1g","libfuse2","squashfs-tools","libgtk2.0-dev","libgtk-3-dev","libmaliit-glib-dev"]
